<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thornbury + Northcote — Property Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- chroma.js (colour scales only, 18 KB) -->
  <script src="https://unpkg.com/chroma-js@2.4.2/chroma.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0.55rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
      flex-wrap: wrap;
      row-gap: 0.4rem;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      color: #222;
      white-space: nowrap;
    }

    .header-divider {
      width: 1px;
      height: 1.4rem;
      background: #e0e0e0;
      flex-shrink: 0;
    }

    /* ── Layer toggle ── */
    .layer-toggle {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .toggle-label {
      font-size: 0.75rem;
      color: #999;
      white-space: nowrap;
    }

    .layer-btn {
      padding: 5px 13px;
      border: 1.5px solid #ccc;
      border-radius: 20px;
      background: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .layer-btn:hover { border-color: #999; color: #222; }

    .layer-btn.active {
      background: #222;
      border-color: #222;
      color: #fff;
    }

    .layer-btn.overlay-active {
      background: #1565c0;
      border-color: #1565c0;
      color: #fff;
    }

    /* ── Map ── */
    .map-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
    }

    #map {
      position: absolute;
      inset: 0;
    }

    /* ── Legend (Leaflet custom control) ── */
    .legend-control {
      background: #fff;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 11px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.18);
      min-width: 160px;
    }

    .legend-title {
      font-weight: 600;
      font-size: 11px;
      margin-bottom: 6px;
      color: #333;
    }

    .legend-gradient {
      height: 10px;
      border-radius: 3px;
      margin: 4px 0;
    }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      color: #888;
      font-size: 10px;
    }

    .legend-note {
      color: #aaa;
      font-size: 9.5px;
      margin-top: 6px;
      line-height: 1.4;
    }

    .legend-no-data {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 5px;
      color: #aaa;
      font-size: 10px;
    }

    .legend-no-data-swatch {
      width: 14px;
      height: 10px;
      background: #d8d8d8;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── SA1 Tooltip ── */
    .sa1-tooltip {
      font-size: 12px;
      line-height: 1.6;
      min-width: 160px;
    }

    .sa1-tooltip strong {
      display: block;
      font-size: 13px;
      margin-bottom: 2px;
    }

    .sa1-tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .sa1-tooltip .tt-label { color: #888; }
    .sa1-tooltip .tt-val   { font-weight: 600; }
    .sa1-tooltip .tt-na    { color: #bbb; font-style: italic; }
    .sa1-tooltip .tt-sep   { border-top: 1px solid #f0f0f0; margin: 4px 0; }

    /* ── Sale popup ── */
    .sale-popup {
      font-size: 12px;
      line-height: 1.7;
      min-width: 180px;
    }
    .sale-popup strong { display: block; font-size: 12px; margin-bottom: 3px; }
    .sale-popup .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .sale-popup .tt-label { color: #888; }
    .sale-popup .tt-val   { font-weight: 600; }

    /* ── Lot polygon overlay colours (used as CSS vars via JS) ── */
    .lot-tiny   { fill: #ef9a9a; stroke: #c62828; }
    .lot-small  { fill: #ffe082; stroke: #f57f17; }
    .lot-medium { fill: #a5d6a7; stroke: #2e7d32; }
    .lot-large  { fill: #90caf9; stroke: #0d47a1; }
    .lot-xl     { fill: #ce93d8; stroke: #6a1b9a; }

    /* ── No-data banner ── */
    #no-data-banner {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.95);
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.5rem 2rem;
      text-align: center;
      z-index: 1000;
      max-width: 340px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.12);
    }

    #no-data-banner h2 { font-size: 1rem; margin-bottom: 0.5rem; }
    #no-data-banner p  { font-size: 0.82rem; color: #666; line-height: 1.5; }
    #no-data-banner code {
      display: block;
      background: #f5f5f5;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      font-size: 0.78rem;
      margin-top: 0.5rem;
      text-align: left;
    }
  </style>
</head>
<body>

  <header>
    <h1>Thornbury + Northcote</h1>

    <!-- SA1 choropleth layer selector -->
    <div class="layer-toggle" id="layer-toggle"></div>

    <div class="header-divider"></div>

    <!-- Lots + Sales overlay toggle -->
    <div class="layer-toggle">
      <button class="layer-btn" id="overlay-btn" onclick="toggleOverlay()">Lots + Sales</button>
    </div>

    <!-- Lot size filter (shown when overlay is on) -->
    <div class="layer-toggle" id="lot-filter" style="display:none">
      <span class="toggle-label">Show lots:</span>
    </div>
  </header>

  <div class="map-wrap">
    <div id="map"></div>
    <div id="no-data-banner">
      <h2>Data not yet generated</h2>
      <p>Run the build script to fetch SA1 boundaries, property prices, and lot sizes:</p>
      <code>pip install requests pandas geopandas shapely geopy<br>
python3 northbury/scripts/build_data.py</code>
    </div>
  </div>

  <script>
  // ── Layer definitions ────────────────────────────────────────────────────────
  // To add a new choropleth layer, add one entry here only.
  const LAYERS = {
    prices: {
      label:  "House Prices",
      field:  "median_price",
      format: v => "$" + Math.round(v / 1000) + "k",
      scale:  chroma.scale(["#fff3e0", "#fb8c00", "#bf360c"]).mode("lab"),
      note:   "Median sold price — houses only\n(realestate.com.au, geocoded to SA1)",
    },
    lots: {
      label:  "Lot Sizes",
      field:  "median_lot_m2",
      format: v => Math.round(v) + " m²",
      scale:  chroma.scale(["#e3f2fd", "#1976d2", "#0d47a1"]).mode("lab"),
      note:   "Median residential lot size — Vicmap parcel data",
    },
    hedonic: {
      label:  "Land Value",
      field:  "hedonic_price",
      format: v => "$" + Math.round(v / 1000) + "k",
      scale:  chroma.scale(["#f3e5f5", "#8e24aa", "#4a148c"]).mode("lab"),
      note:   "Hedonic-adjusted price per SA1\nControls for beds, baths, cars, lot size via OLS.\nShows pure location / land value.",
    },
  };

  // ── Lot size filter definitions ──────────────────────────────────────────────
  const LOT_FILTERS = [
    { label: "All",     min: 0,    max: Infinity },
    { label: "≥ 400",  min: 400,  max: Infinity },
    { label: "≥ 500",  min: 500,  max: Infinity },
    { label: "≥ 600",  min: 600,  max: Infinity },
    { label: "≥ 800",  min: 800,  max: Infinity },
  ];

  // Returns a fill/stroke colour based on lot area
  function lotColor(area) {
    if (area >= 800) return { fill: "#ce93d8", stroke: "#6a1b9a" };
    if (area >= 600) return { fill: "#90caf9", stroke: "#0d47a1" };
    if (area >= 500) return { fill: "#a5d6a7", stroke: "#2e7d32" };
    if (area >= 400) return { fill: "#ffe082", stroke: "#e65100" };
    return              { fill: "#ef9a9a", stroke: "#b71c1c" };
  }

  let activeLayerId  = "prices";
  let sa1Layer       = null;
  let geojsonData    = null;
  let domainByLayer  = {};

  let showOverlay    = false;
  let overlayLoaded  = false;
  let lotsData       = null;
  let salesData      = null;
  let lotsLayer      = null;
  let salesLayer     = null;
  let activeLotFilter = 0;   // index into LOT_FILTERS

  // ── Map setup ────────────────────────────────────────────────────────────────
  const map = L.map("map", { zoomControl: true });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
    maxZoom: 19,
  }).addTo(map);

  // ── Legend control ───────────────────────────────────────────────────────────
  const LegendControl = L.Control.extend({
    onAdd() {
      this._div = L.DomUtil.create("div", "legend-control");
      return this._div;
    },
    update(layerId, domain) {
      const layer = LAYERS[layerId];
      const [lo, hi] = domain;
      const steps = 6;
      const gradientParts = Array.from({length: steps}, (_, i) =>
        layer.scale(i / (steps - 1)).hex()
      );
      this._div.innerHTML = `
        <div class="legend-title">${layer.label}</div>
        <div class="legend-gradient"
             style="background: linear-gradient(to right, ${gradientParts.join(",")})"></div>
        <div class="legend-labels">
          <span>${layer.format(lo)}</span>
          <span>${layer.format(hi)}</span>
        </div>
        <div class="legend-no-data">
          <div class="legend-no-data-swatch"></div>No data
        </div>
        <div class="legend-note">${layer.note.replace(/\n/g, "<br>")}</div>
      `;
    }
  });

  const legend = new LegendControl({ position: "bottomright" });
  legend.addTo(map);

  // ── SA1 choropleth layer toggle buttons ──────────────────────────────────────
  const toggleEl = document.getElementById("layer-toggle");
  Object.entries(LAYERS).forEach(([id, cfg]) => {
    const btn = document.createElement("button");
    btn.className = "layer-btn" + (id === activeLayerId ? " active" : "");
    btn.textContent = cfg.label;
    btn.onclick = () => switchLayer(id);
    btn.dataset.layerId = id;
    toggleEl.appendChild(btn);
  });

  function switchLayer(id) {
    activeLayerId = id;
    toggleEl.querySelectorAll(".layer-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.layerId === id)
    );
    if (sa1Layer && geojsonData) {
      sa1Layer.setStyle(styleFeature);
      legend.update(id, domainByLayer[id]);
    }
  }

  // ── Lot size filter buttons ──────────────────────────────────────────────────
  const lotFilterEl = document.getElementById("lot-filter");
  LOT_FILTERS.forEach((f, idx) => {
    const btn = document.createElement("button");
    btn.className = "layer-btn" + (idx === 0 ? " active" : "");
    btn.textContent = f.label;
    btn.dataset.filterIdx = idx;
    btn.onclick = () => applyLotFilter(idx);
    lotFilterEl.appendChild(btn);
  });

  function applyLotFilter(idx) {
    activeLotFilter = idx;
    lotFilterEl.querySelectorAll(".layer-btn").forEach(b =>
      b.classList.toggle("active", +b.dataset.filterIdx === idx)
    );
    renderLots();
    renderSales();
  }

  // ── Overlay toggle ───────────────────────────────────────────────────────────
  function toggleOverlay() {
    showOverlay = !showOverlay;
    document.getElementById("overlay-btn").classList.toggle("overlay-active", showOverlay);
    lotFilterEl.style.display = showOverlay ? "" : "none";
    if (showOverlay && !overlayLoaded) {
      overlayLoaded = true;
      Promise.allSettled([
        fetch("data/lots.geojson").then(r => r.ok ? r.json() : null).catch(() => null),
        fetch("data/sales.geojson").then(r => r.ok ? r.json() : null).catch(() => null),
      ]).then(([lr, sr]) => {
        lotsData  = lr.value || null;
        salesData = sr.value || null;
        renderLots();
        renderSales();
      });
    } else {
      renderLots();
      renderSales();
    }
  }

  // ── Lot polygon layer ────────────────────────────────────────────────────────
  function renderLots() {
    if (lotsLayer) { map.removeLayer(lotsLayer); lotsLayer = null; }
    if (!showOverlay || !lotsData) return;

    const { min } = LOT_FILTERS[activeLotFilter];
    const filtered = {
      ...lotsData,
      features: lotsData.features.filter(f => f.properties.area_m2 >= min),
    };

    lotsLayer = L.geoJSON(filtered, {
      style(feature) {
        const c = lotColor(feature.properties.area_m2);
        return { fillColor: c.fill, fillOpacity: 0.35, color: c.stroke, weight: 1 };
      },
      onEachFeature(feature, layer) {
        const p = feature.properties;
        layer.on({
          mouseover(e) {
            e.target.setStyle({ fillOpacity: 0.6, weight: 2 });
            e.target.bringToFront();
            e.target.bindTooltip(
              `<div class="sa1-tooltip">
                <strong>${p.area_m2} m² lot</strong>
                ${p.sa1_code ? `<div class="tt-row"><span class="tt-label">SA1</span><span class="tt-val">${p.sa1_code}</span></div>` : ""}
              </div>`,
              { sticky: true, opacity: 1 }
            ).openTooltip();
          },
          mouseout(e) {
            const c = lotColor(p.area_m2);
            e.target.setStyle({ fillOpacity: 0.35, color: c.stroke, weight: 1 });
            e.target.closeTooltip();
          },
        });
      },
    }).addTo(map);
  }

  // ── Sale dot layer ───────────────────────────────────────────────────────────
  function renderSales() {
    if (salesLayer) { map.removeLayer(salesLayer); salesLayer = null; }
    if (!showOverlay || !salesData) return;

    const { min } = LOT_FILTERS[activeLotFilter];

    salesLayer = L.geoJSON(salesData, {
      filter(feature) {
        const lm = feature.properties.land_m2;
        // When min=0, show all; otherwise require land_m2 >= min
        return min === 0 || (lm != null && lm >= min);
      },
      pointToLayer(feature, latlng) {
        const p = feature.properties;
        return L.circleMarker(latlng, {
          radius:      6,
          fillColor:   p.price ? "#e53935" : "#888",
          fillOpacity: 0.9,
          color:       "#fff",
          weight:      1.5,
        });
      },
      onEachFeature(feature, layer) {
        const p = feature.properties;
        const price = p.price
          ? "$" + (p.price / 1000).toFixed(0) + "k"
          : "Not disclosed";
        const rows = [
          ["Price",    price],
          p.beds  != null ? ["Beds",   p.beds]                        : null,
          p.baths != null ? ["Baths",  p.baths]                       : null,
          p.cars  != null ? ["Cars",   p.cars]                        : null,
          p.land_m2       ? ["Lot",    Math.round(p.land_m2) + " m²"] : null,
          p.sold_date     ? ["Sold",   p.sold_date]                   : null,
        ].filter(Boolean);

        layer.bindPopup(`
          <div class="sale-popup">
            <strong>${p.address || "Address unknown"}</strong>
            ${rows.map(([label, val]) =>
              `<div class="tt-row">
                <span class="tt-label">${label}</span>
                <span class="tt-val">${val}</span>
              </div>`
            ).join("")}
          </div>
        `);
      },
    }).addTo(map);

    // Bring sales dots above lot polygons
    if (lotsLayer) salesLayer.bringToFront();
  }

  // ── Choropleth styling ───────────────────────────────────────────────────────
  function styleFeature(feature) {
    const layer  = LAYERS[activeLayerId];
    const val    = feature.properties[layer.field];
    const domain = domainByLayer[activeLayerId];
    if (!val || !domain) return { fillColor: "#d8d8d8", fillOpacity: 0.6, color: "#fff", weight: 1 };
    const t = (val - domain[0]) / (domain[1] - domain[0]);
    return {
      fillColor:   layer.scale(Math.max(0, Math.min(1, t))).hex(),
      fillOpacity: 0.75,
      color:       "#fff",
      weight:      1.2,
    };
  }

  // ── SA1 tooltip ─────────────────────────────────────────────────────────────
  function fmt(val, formatter) {
    return val != null
      ? `<span class="tt-val">${formatter(val)}</span>`
      : `<span class="tt-na">No data</span>`;
  }

  function bindEvents(feature, layer) {
    const p      = feature.properties;
    const suburb = p.suburb || p.SA2_NAME_2021 || "";
    const sa1    = p.SA1_CODE_2021 || "";

    layer.on({
      mouseover(e) {
        e.target.setStyle({ weight: 2.5, color: "#333", fillOpacity: 0.88 });
        e.target.bringToFront();
        if (salesLayer) salesLayer.bringToFront();

        const content = `
          <div class="sa1-tooltip">
            <strong>${suburb}</strong>
            <div class="tt-row">
              <span class="tt-label">Median price</span>
              ${fmt(p.median_price, v => "$" + Math.round(v/1000) + "k")}
            </div>
            ${p.sale_count ? `<div class="tt-row"><span class="tt-label">Sales</span><span class="tt-val">${p.sale_count}</span></div>` : ""}
            <div class="tt-sep"></div>
            <div class="tt-row">
              <span class="tt-label">Land value</span>
              ${fmt(p.hedonic_price, v => "$" + Math.round(v/1000) + "k")}
            </div>
            ${p.hedonic_count >= 3 ? `<div class="tt-row"><span class="tt-label">Hedonic n</span><span class="tt-val">${p.hedonic_count}</span></div>` : ""}
            <div class="tt-sep"></div>
            <div class="tt-row">
              <span class="tt-label">Median lot</span>
              ${fmt(p.median_lot_m2, v => Math.round(v) + " m²")}
            </div>
            ${p.lot_count ? `<div class="tt-row"><span class="tt-label">Parcels</span><span class="tt-val">${p.lot_count}</span></div>` : ""}
            <div style="margin-top:4px;font-size:9.5px;color:#bbb">SA1 ${sa1}</div>
          </div>`;
        e.target.bindTooltip(content, { sticky: true, opacity: 1, className: "" }).openTooltip();
      },
      mouseout(e) {
        sa1Layer.resetStyle(e.target);
        e.target.closeTooltip();
      },
    });
  }

  // ── Compute domain (5th–95th percentile) for each layer ─────────────────────
  function computeDomains(features) {
    Object.keys(LAYERS).forEach(id => {
      const field = LAYERS[id].field;
      const vals  = features.map(f => f.properties[field]).filter(v => v != null && v > 0);
      if (vals.length) {
        vals.sort((a, b) => a - b);
        const lo = vals[Math.floor(vals.length * 0.05)];
        const hi = vals[Math.floor(vals.length * 0.95)] || vals[vals.length - 1];
        domainByLayer[id] = [lo, hi];
      } else {
        domainByLayer[id] = [0, 1];
      }
    });
  }

  // ── Load SA1 data ────────────────────────────────────────────────────────────
  fetch("data/sa1.geojson")
    .then(r => {
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      return r.json();
    })
    .then(geojson => {
      geojsonData = geojson;
      const features = geojson.features || [];

      const hasAnyData = features.some(f =>
        f.properties.median_price != null || f.properties.median_lot_m2 != null
      );

      if (features.length === 0) {
        document.getElementById("no-data-banner").style.display = "block";
        return;
      }

      computeDomains(features);

      sa1Layer = L.geoJSON(geojson, {
        style:         styleFeature,
        onEachFeature: bindEvents,
      }).addTo(map);

      map.fitBounds(sa1Layer.getBounds(), { padding: [20, 20] });
      legend.update(activeLayerId, domainByLayer[activeLayerId]);

      if (!hasAnyData) {
        document.getElementById("no-data-banner").style.display = "block";
      }
    })
    .catch(() => {
      map.setView([-37.768, 145.003], 14);
      document.getElementById("no-data-banner").style.display = "block";
    });
  </script>

</body>
</html>
