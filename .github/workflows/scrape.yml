name: Scrape Broadsheet Data

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scrape mode'
        required: true
        default: 'live-only'
        type: choice
        options:
          - live-only       # current Broadsheet only (~30–60 min)
          - wayback-only    # historical Wayback Machine only (~20–40 min)
          - full            # both in sequence (~1–2 hrs)
  schedule:
    - cron: '0 2 1 * *'   # 2 am UTC on the 1st of each month

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml cloudscraper

      - name: Ensure data/raw directory exists
        run: mkdir -p data/raw

      - name: Run scraper
        env:
          # Optional: add a BROADSHEET_COOKIE secret in repo settings
          # if Cloudflare blocks the runner (Settings → Secrets → Actions).
          # Value: the cf_clearance cookie from your browser session on broadsheet.com.au
          BROADSHEET_COOKIE: ${{ secrets.BROADSHEET_COOKIE }}
        run: |
          MODE="${{ github.event.inputs.mode || 'live-only' }}"
          if [ "$MODE" = "full" ]; then
            python3 scripts/scrape_broadsheet.py
          else
            python3 scripts/scrape_broadsheet.py --${MODE}
          fi

      - name: Process scraped data into visualisation format
        run: python3 scripts/process_scraped_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/ data/combined.json data/snapshots/
          git diff --cached --quiet \
            && echo "Nothing changed — scrape returned same data." \
            || git commit -m "data: Broadsheet scrape $(date -u +%Y-%m-%d) [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
